name: Pages

on:
  push:
    branches: [main]
    paths: [docs/**, install.sh, .github/workflows/pages.yml]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    # Deploy the docs site only from the canonical private repo. On the public
    # bifu-ai mirror (which receives this file via sync) Pages isn't enabled and
    # would clash on the cli.bifu.dev custom domain — skip there.
    if: ${{ github.repository == 'decodeex/bifu-cli' }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Sync install.sh into site
        run: cp install.sh docs/install.sh
      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v5
        with:
          path: docs
      - id: deployment
        uses: actions/deploy-pages@v5
