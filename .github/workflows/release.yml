name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          version: latest
          args: release --clean
        env:
          # Cross-repo release token. GoReleaser publishes the GitHub Release to
          # the PUBLIC decodeex/bifu-cli-releases repo and pushes the cask to
          # decodeex/homebrew-tap (the default GITHUB_TOKEN is scoped to this
          # private repo only). Use a fine-grained PAT (owner: decodeex) with
          # access to BOTH decodeex/bifu-cli-releases and decodeex/homebrew-tap,
          # permission Contents: Read and write.
          GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}

  sync-public:
    needs: goreleaser
    # Stable releases only — prerelease (rc/beta) tags skip docs/npm.
    if: ${{ !contains(github.ref_name, '-') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Sync README + skills into the public releases repo
        env:
          TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
        run: |
          git config --global user.name "bifu-admin"
          git config --global user.email "noreply@bifu.co"
          tmp=$(mktemp -d)
          git clone --depth 1 "https://x-access-token:${TOKEN}@github.com/decodeex/bifu-cli-releases.git" "$tmp"
          # README with a distribution banner (source repo is private)
          {
            printf '> **bifu-cli 发布与下载仓库** —— 源码仓库私有,这里托管对外发布的二进制(curl / Homebrew / npm 从此处下载)。\n\n'
            printf -- '---\n\n'
            cat README.md
          } > "$tmp/README.md"
          # skills (SKILL.md guides only; drop the Go embed file)
          rm -rf "$tmp/skills"
          cp -R skills "$tmp/skills"
          rm -f "$tmp/skills/embed.go"
          cd "$tmp"
          git add -A
          git commit -m "docs: sync README + skills from bifu-cli @ ${GITHUB_REF_NAME}" || { echo "no changes"; exit 0; }
          git push

  npm-publish:
    needs: goreleaser
    # Stable releases only — prerelease (rc/beta) tags are GitHub-prerelease-only.
    if: ${{ !contains(github.ref_name, '-') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      - name: Set package version from tag
        working-directory: npm
        run: npm version "${GITHUB_REF_NAME#v}" --no-git-tag-version --allow-same-version
      - name: Publish to npm
        working-directory: npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
