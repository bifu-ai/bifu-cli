name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean
        env:
          # The release is published to the PUBLIC decodeex/bifu-cli-releases
          # repo (source repo is private), so GoReleaser needs a token with
          # write access to it — the default GITHUB_TOKEN is scoped to this repo
          # only. Reuse the same cross-repo token used for the tap.
          GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}

  sync-readme:
    needs: goreleaser
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Sync README into the public releases repo
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
        run: |
          {
            printf '> **bifu-cli 发布与下载仓库** —— 源码仓库私有,这里托管对外发布的二进制(curl / Homebrew / npm 从此处下载)。\n\n'
            printf -- '---\n\n'
            cat README.md
          } > /tmp/RELEASES_README.md
          SHA=$(gh api repos/decodeex/bifu-cli-releases/contents/README.md -q .sha 2>/dev/null || true)
          gh api -X PUT repos/decodeex/bifu-cli-releases/contents/README.md \
            -f message="docs: sync README from bifu-cli @ ${GITHUB_REF_NAME}" \
            -f content="$(base64 -w0 /tmp/RELEASES_README.md)" \
            ${SHA:+-f sha="$SHA"}

  npm-publish:
    needs: goreleaser
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      - name: Set package version from tag
        working-directory: npm
        run: npm version "${GITHUB_REF_NAME#v}" --no-git-tag-version --allow-same-version
      - name: Publish to npm
        working-directory: npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
