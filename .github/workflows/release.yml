name: Release

on:
  push:
    tags:
      - "v*"

# Least-privilege at the workflow level; jobs widen only what they need.
permissions:
  contents: read

jobs:
  goreleaser:
    # Canonical repo only — never publish releases from the public mirror.
    if: ${{ github.repository == 'decodeex/bifu-cli' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # cosign keyless signing (Sigstore OIDC)
    steps:
      # Actions are pinned to commit SHAs (not floating tags) so a hijacked
      # upstream tag can't inject code into the release build
      # (BIFU-CLI-202606-016).
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
          cache: true
      - uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3
      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7
        with:
          version: "v2.16.0" # pinned, not "latest"
          args: release --clean
        env:
          # GITHUB_TOKEN publishes the GitHub Release to the PUBLIC
          # decodeex/bifu-cli-releases repo; HOMEBREW_TAP_GITHUB_TOKEN pushes the
          # cask to decodeex/homebrew-tap. Use two SEPARATE fine-grained,
          # minimally-scoped PATs (one per target repo) rather than one broad PAT
          # shared across both (BIFU-CLI-202606-016).
          GITHUB_TOKEN: ${{ secrets.RELEASES_REPO_TOKEN || secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}

  desktop-extension:
    needs: goreleaser
    # Canonical repo only — build the Claude Desktop .mcpb bundles (one per
    # platform, each bundling the matching binary) and attach to the release.
    if: ${{ github.repository == 'decodeex/bifu-cli' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
          cache: true
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "20"
      - name: Build .mcpb bundles
        run: scripts/build-mcpb.sh "${GITHUB_REF_NAME}"
      - name: Attach .mcpb bundles to the release
        env:
          GH_TOKEN: ${{ secrets.RELEASES_REPO_TOKEN || secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
        run: |
          gh release upload "${GITHUB_REF_NAME}" dist/mcpb/*.mcpb \
            --repo decodeex/bifu-cli-releases --clobber

  sync-public:
    needs: goreleaser
    # Canonical repo + stable releases only — prerelease (rc/beta) tags skip docs/npm.
    if: ${{ github.repository == 'decodeex/bifu-cli' && !contains(github.ref_name, '-') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Sync README + skills into the public releases repo
        env:
          TOKEN: ${{ secrets.RELEASES_REPO_TOKEN || secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
        run: |
          git config --global user.name "bifu-admin"
          git config --global user.email "noreply@bifu.co"
          tmp=$(mktemp -d)
          git clone --depth 1 "https://x-access-token:${TOKEN}@github.com/decodeex/bifu-cli-releases.git" "$tmp"
          # README with a distribution banner (source repo is private)
          {
            printf '> **bifu-cli 发布与下载仓库** —— 源码仓库私有,这里托管对外发布的二进制(curl / Homebrew / npm 从此处下载)。\n\n'
            printf -- '---\n\n'
            cat README.md
          } > "$tmp/README.md"
          # skills (SKILL.md guides only; drop the Go embed file)
          rm -rf "$tmp/skills"
          cp -R skills "$tmp/skills"
          rm -f "$tmp/skills/embed.go"
          cd "$tmp"
          git add -A
          git commit -m "docs: sync README + skills from bifu-cli @ ${GITHUB_REF_NAME}" || { echo "no changes"; exit 0; }
          git push

  npm-publish:
    needs: goreleaser
    # Canonical repo + stable releases only — rc/beta tags are GitHub-prerelease-only.
    if: ${{ github.repository == 'decodeex/bifu-cli' && !contains(github.ref_name, '-') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      - name: Set package version from tag
        working-directory: npm
        run: npm version "${GITHUB_REF_NAME#v}" --no-git-tag-version --allow-same-version
      - name: Publish to npm
        working-directory: npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
