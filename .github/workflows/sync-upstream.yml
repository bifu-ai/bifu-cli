name: Sync to upstream (open source)

# Mirror the main branch to the public open-source repo under the bifu-ai org.
# bifu-ai/bifu-cli is a one-way managed mirror — never commit to it directly,
# every push here is overwritten by this job. Auth is a write deploy key scoped
# to ONLY bifu-ai/bifu-cli (private key in the UPSTREAM_SYNC_SSH_KEY secret).

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: sync-upstream
  cancel-in-progress: false

env:
  UPSTREAM_REPO: bifu-ai/bifu-cli
  UPSTREAM_BRANCH: main

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # full history for the mirror

      - name: Push main to the bifu-ai upstream
        env:
          SSH_KEY: ${{ secrets.UPSTREAM_SYNC_SSH_KEY }}
        run: |
          if [ -z "$SSH_KEY" ]; then
            echo "::warning::UPSTREAM_SYNC_SSH_KEY not set — skipping upstream sync. Add the deploy-key private key to enable it."
            exit 0
          fi
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -t ed25519 github.com >> ~/.ssh/known_hosts 2>/dev/null
          # Force so the upstream branch always matches this repo's main exactly.
          git push --force "git@github.com:${UPSTREAM_REPO}.git" "HEAD:refs/heads/${UPSTREAM_BRANCH}"
          echo "Synced $(git rev-parse --short HEAD) -> ${UPSTREAM_REPO}@${UPSTREAM_BRANCH}"
