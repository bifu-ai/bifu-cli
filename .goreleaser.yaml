# GoReleaser config — builds cross-platform binaries, publishes a GitHub
# Release, and updates the Homebrew tap. See: https://goreleaser.com
version: 2

project_name: bifu-cli

before:
  hooks:
    - go mod tidy

builds:
  - id: bifu-cli
    main: .
    binary: bifu-cli
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X bifu-cli/cmd.version={{ .Version }}

archives:
  - id: bifu-cli
    # Stable, predictable names so install.sh and the npm wrapper can build the
    # download URL: bifu-cli_<os>_<arch>.tar.gz (tar.gz on all platforms;
    # Windows 10+ ships bsdtar which extracts it).
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

# Sign the checksums file with cosign (keyless / Sigstore + OIDC) so users can
# verify artifact provenance — the binaries were previously unsigned
# (BIFU-CLI-202606-015). The CI job installs cosign and runs with
# id-token: write to obtain the OIDC token.
#
# Verify a download with:
#   cosign verify-blob --certificate checksums.txt.pem \
#     --signature checksums.txt.sig \
#     --certificate-identity-regexp 'https://github.com/decodeex/bifu-cli' \
#     --certificate-oidc-issuer 'https://token.actions.githubusercontent.com' \
#     checksums.txt
signs:
  - cmd: cosign
    artifacts: checksum
    output: true
    certificate: "${artifact}.pem"
    args:
      - sign-blob
      - "--output-certificate=${certificate}"
      - "--output-signature=${signature}"
      - "${artifact}"
      - "--yes"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "merge conflict"
      - Merge pull request
      - Merge branch

homebrew_casks:
  - name: bifu-cli
    # Don't push a cask for prereleases/snapshots (rc builds) — Homebrew tracks
    # the official stable release only.
    skip_upload: "auto"
    binaries:
      - bifu-cli
    repository:
      owner: decodeex
      name: homebrew-tap
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Casks
    homepage: "https://cli.bifu.dev"
    description: "BifuFX trading platform CLI — spot, contract, forex, WebSocket, MCP"
    # NOTE: previously a post-install hook ran `xattr -dr com.apple.quarantine`,
    # silently bypassing macOS Gatekeeper for an unsigned binary
    # (BIFU-CLI-202606-015). That blanket strip has been removed. Until the
    # binary is Apple-notarized, macOS users may need to allow it once via
    # System Settings → Privacy & Security (see the release notes). Artifact
    # integrity is verifiable via the cosign-signed checksums.txt above.

release:
  # Source repo (decodeex/bifu-cli) is private, so publish the downloadable
  # binaries to a dedicated PUBLIC repo. install.sh, the Homebrew cask, and the
  # npm postinstall all fetch from here.
  github:
    owner: decodeex
    name: bifu-cli-releases
  draft: false
  prerelease: auto
  footer: |
    ---
    Install: `curl -fsSL https://cli.bifu.dev/install.sh | bash`
    Homebrew: `brew install decodeex/tap/bifu-cli`
    npm: `npm i -g @decodeex/bifu-cli`

    **Verify (cosign):**
    ```
    cosign verify-blob --certificate checksums.txt.pem --signature checksums.txt.sig \
      --certificate-identity-regexp 'https://github.com/decodeex/bifu-cli' \
      --certificate-oidc-issuer 'https://token.actions.githubusercontent.com' checksums.txt
    ```

    **macOS:** binaries are not yet Apple-notarized. If Gatekeeper blocks the
    first launch, allow it once via System Settings → Privacy & Security.
